name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7   # Adjust for your timezone (Vietnam = 7)
